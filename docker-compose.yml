services:
  app:
    build: .
    volumes:
      - .:/app
      - ~/.ssh:/home/deck/.ssh:ro
    environment:
      - RUST_LOG=debug
      # - RUST_LOG=error
    tty: true
    ports:
      # host:container，左邊是主機要開放的 port，右邊是容器內服務的 port
      # 預設仍用 9999，若主機 9999 衝突可用 APP_WEB_HOST_PORT 覆寫
      - "${APP_WEB_HOST_PORT:-9999}:9999"
    env_file:
      - .env
    command: bash -c "mkdir -p /root/.ssh && ssh-keyscan 38.242.233.231 >> /root/.ssh/known_hosts; tailwindcss -i ./src/input.css -o ./public/tailwind.css -w & while true; do sleep 30; done"
