events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format upstream_debug '$remote_addr - $host "$request" '
                              'status=$status request_uri="$request_uri" uri="$uri" '
                              'sent_location="$sent_http_location" upstream_location="$upstream_http_location" '
                              'upstream_addr="$upstream_addr" upstream_status="$upstream_status" '
                              'referer="$http_referer" ua="$http_user_agent"';
    access_log /var/log/nginx/access.log upstream_debug;

    # Avoid 400 Request Header Or Cookie Too Large when browser cookies grow.
    client_header_buffer_size 16k;
    large_client_header_buffers 8 32k;

    server {
        listen 443 ssl;
        server_name ifecaro.com;

        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        root /usr/share/nginx/html;
        index index.html;

        # Production PocketBase path.
        # /db/... -> production PocketBase service
        location ^~ /db/ {
            proxy_pass http://pocketbase:8090/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Path-based isolation: proxy /staging traffic to staging services.
        # Staging frontend is published on the Docker host port 18080.
        # Use the bridge gateway IP directly to avoid Linux containers failing
        # startup on unresolved `host.docker.internal`.
        location /staging/ {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_pass http://172.17.0.1:18080/;
        }

        location = /staging/db {
            add_header X-Ifecaro-Debug-Route "staging-db-canonical-redirect" always;
            return 302 /staging/db/;
        }

        location = /staging/db/__debug {
            default_type application/json;
            add_header Cache-Control "no-store" always;
            add_header X-Ifecaro-Debug-Route "staging-db-debug-endpoint" always;
            return 200 '{"request_uri":"$request_uri","uri":"$uri","host":"$host","http_x_forwarded_proto":"$http_x_forwarded_proto","remote_addr":"$remote_addr"}';
        }

        # PocketBase admin UI may navigate to /_ from script/runtime; keep it under staging prefix.
        location = /staging/db/_ {
            add_header X-Ifecaro-Debug-Route "staging-db-admin-canonical-redirect" always;
            return 302 /staging/db/_/;
        }

        location = /_ {
            add_header X-Ifecaro-Debug-Route "root-admin-redirect-to-staging-db" always;
            return 302 /staging/db/_;
        }

        location ^~ /_/ {
            add_header X-Ifecaro-Debug-Route "root-admin-prefix-redirect-to-staging-db" always;
            return 302 /staging/db$uri$is_args$args;
        }

        # Staging PocketBase path.
        # /staging/db/... -> /... (on staging PocketBase)
        location ^~ /staging/db/ {
            proxy_http_version 1.1;
            add_header X-Ifecaro-Debug-Route "staging-db-proxy" always;
            add_header X-Ifecaro-Upstream-Location $upstream_http_location always;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Prefix /staging/db;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_redirect ~^(/.*)$ /staging/db$1;
            proxy_redirect ~^https?://[^/]+(/.*)$ /staging/db$1;
            rewrite ^/staging/db(/.*)$ $1 break;
            proxy_pass http://172.17.0.1:18090;
        }

        # Serve static frontend assets
        location /assets/ {
            root /usr/share/nginx/html;
            add_header Cache-Control "public, max-age=15552000";
        }

        # Favicon or other static routes
        location = /favicon.ico {
            root /usr/share/nginx/html;
        }

        # Serve SPA for all other routes
        location / {
            root /usr/share/nginx/html;
            add_header X-Ifecaro-Debug-Route "spa-fallback" always;
            try_files $uri /index.html;
        }
    }
}
