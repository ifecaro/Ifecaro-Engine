# Production edge nginx (TLS enabled).
# Required files in /etc/nginx/certs:
# - cert.pem
# - key.pem

server {
    listen 80;
    listen [::]:80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Avoid 400 Request Header Or Cookie Too Large when browser cookies grow.
    client_header_buffer_size 16k;
    large_client_header_buffers 8 32k;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /staging {
        return 302 /staging/;
    }

    location = /version.json {
        add_header Cache-Control "no-store" always;
        try_files /version.json =404;
    }

    # Production PocketBase path.
    # /db/... -> production PocketBase service
    location ^~ /db/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass http://pocketbase:8090/;
    }

    # Path-based isolation: proxy /staging traffic to staging services.
    # Staging frontend is published on the Docker host port 18080.
    location /staging/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass http://172.17.0.1:18080/;
    }

    location = /staging/db {
        return 302 /staging/db/;
    }

    # Staging PocketBase is published on host port 18090.
    # /staging/db/... -> /...
    location ^~ /staging/db/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Prefix /staging/db;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_redirect ~^(/.*)$ /staging/db$1;
        rewrite ^/staging/db(/.*)$ $1 break;
        proxy_pass http://172.17.0.1:18090;
    }
}
