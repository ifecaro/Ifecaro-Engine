# Standalone staging edge nginx (TLS enabled).
# Required files in /etc/nginx/certs:
# - fullchain.pem
# - privkey.pem

server {
    listen 80;
    listen [::]:80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Avoid 400 Request Header Or Cookie Too Large when browser cookies grow.
    client_header_buffer_size 16k;
    large_client_header_buffers 8 32k;

    root /usr/share/nginx/html;
    index index.html;

    location = /version.json {
        add_header Cache-Control "no-store" always;
        try_files /version.json =404;
    }

    # Staging-local PocketBase path for direct access to staging container.
    location ^~ /db/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass http://pocketbase:8090/;
    }

    # Staging nginx serves app content at root because ingress already strips
    # environment boundary using /staging/* -> host:18080 forwarding.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
