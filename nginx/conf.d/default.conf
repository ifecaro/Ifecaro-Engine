server {
    listen 80;
    server_name _;

    # Avoid 400 Request Header Or Cookie Too Large when browser cookies grow.
    client_header_buffer_size 16k;
    large_client_header_buffers 8 32k;

    root /usr/share/nginx/html;
    index index.html;

    # Temporarily disable SPA fallback to verify routing behavior.
    location / {
        try_files $uri $uri/ =404;
    }

    location = /staging {
        return 302 /staging/;
    }

    location = /version.json {
        add_header Cache-Control "no-store" always;
        try_files /version.json =404;
    }
    location = /db {
        return 302 /db/;
    }

    # PocketBase admin UI may navigate to /_ from script/runtime; keep it under /db.
    location = /_ {
        return 302 /db/_;
    }

    location ^~ /_/ {
        return 302 /db$uri$is_args$args;
    }

    # PocketBase is published on host port 18090 for staging mode.
    # /db/... -> /...
    location ^~ /db/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Prefix /db;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_redirect ~^(/.*)$ /db$1;
        proxy_redirect ~^https?://[^/]+(/.*)$ /db$1;
        rewrite ^/db(/.*)$ $1 break;
        proxy_pass http://172.17.0.1:18090;
    }
}
