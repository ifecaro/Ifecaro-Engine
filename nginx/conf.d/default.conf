server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /staging {
        return 302 /staging/;
    }

    location = /version.json {
        add_header Cache-Control "no-store" always;
        try_files /version.json =404;
    }

    # Production PocketBase path.
    # /db/... -> production PocketBase service
    location ^~ /db/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass http://pocketbase:8090/;
    }

    # Path-based isolation: proxy /staging traffic to staging services.
    # Staging frontend is published on host port 18080.
    location /staging/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass http://host.docker.internal:18080;
    }

    location = /staging/db {
        return 302 /staging/db/;
    }

    # Staging PocketBase is published on host port 18090.
    # /staging/db/... -> /...
    location ^~ /staging/db/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        rewrite ^/staging/db(/.*)$ $1 break;
        proxy_pass http://host.docker.internal:18090;
    }
}
