name: CI

on:
  push:
    branches:
      - main
      - master

jobs:
  build-engine:
    name: Build ifecaro-development
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true
          cache-workspaces: ". -> target"

      - name: Cargo check
        run: cargo check --all-targets

      - name: Determine version
        id: version
        run: |
          version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="ifecaro") | .version')
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Capture build metadata
        id: build_meta
        run: |
          echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "${GITHUB_OUTPUT}"

      - name: Set image name
        run: |
          repo_owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "ENGINE_IMAGE=ghcr.io/${repo_owner}/ifecaro-development" >> "${GITHUB_ENV}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkit-image: public.ecr.aws/docker/library/buildkit:buildx-stable-1

      - name: Build and push ifecaro-development image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          cache-from: type=gha,scope=ifecaro-development-buildx
          cache-to: type=gha,mode=max,scope=ifecaro-development-buildx
          tags: |
            ${{ env.ENGINE_IMAGE }}:latest
            ${{ env.ENGINE_IMAGE }}:v${{ steps.version.outputs.version }}-beta${{ github.run_number }}

  build-frontend:
    name: Build ifecaro-engine (${{ matrix.deploy_env }})
    runs-on: ubuntu-latest
    environment:
      name: ${{ matrix.deploy_env }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - deploy_env: staging
            app_env: staging
            latest_tag: latest-staging
            version_tag_suffix: staging
          - deploy_env: production
            app_env: production
            latest_tag: latest
            version_tag_suffix: production
    env:
      CARGO_TERM_COLOR: always
      SKIP_TAILWIND: "1"
      VITE_APP_ENV: ${{ matrix.app_env }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true
          cache-workspaces: ". -> target"

      - name: Cargo check
        run: cargo check --all-targets

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --locked

      - name: Dioxus web build (release)
        run: dx build --release --platform web

      - name: Determine version
        id: version
        run: |
          version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="ifecaro") | .version')
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Capture build metadata
        id: build_meta
        run: |
          echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "${GITHUB_OUTPUT}"

      - name: Set VITE_BASE_API_URL by environment
        run: |
          if [ "${{ matrix.deploy_env }}" = "production" ]; then
            echo "VITE_BASE_API_URL=${{ vars.PRODUCTION_API_URL }}" >> "${GITHUB_ENV}"
          else
            echo "VITE_BASE_API_URL=${{ vars.STAGING_API_URL }}" >> "${GITHUB_ENV}"
          fi

      - name: Log masked build-time API URL
        run: |
          echo "::add-mask::${VITE_BASE_API_URL}"
          echo "Resolved build-time VITE_BASE_API_URL=${VITE_BASE_API_URL}"

      - name: Validate VITE_BASE_API_URL variable is configured
        run: |
          if [ -z "${VITE_BASE_API_URL}" ]; then
            echo "VITE_BASE_API_URL is empty. Please set STAGING_API_URL / PRODUCTION_API_URL in GitHub Variables." >&2
            exit 1
          fi

      - name: Set image name
        run: |
          repo_owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "FRONTEND_IMAGE=ghcr.io/${repo_owner}/ifecaro-engine" >> "${GITHUB_ENV}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkit-image: public.ecr.aws/docker/library/buildkit:buildx-stable-1

      - name: Build and push ifecaro-engine image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          build-args: |
            VCS_REF=${{ github.sha }}
            BUILD_VERSION=${{ steps.version.outputs.version }}
            BUILD_TIME=${{ steps.build_meta.outputs.build_time }}
            VITE_APP_ENV=${{ matrix.app_env }}
            VITE_BASE_API_URL=${{ env.VITE_BASE_API_URL }}
          cache-from: type=gha,scope=ifecaro-frontend-buildx-${{ matrix.deploy_env }}
          cache-to: type=gha,mode=max,scope=ifecaro-frontend-buildx-${{ matrix.deploy_env }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.environment=${{ matrix.app_env }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ matrix.latest_tag }}
            ${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.version }}-${{ matrix.version_tag_suffix }}

      - name: Verify VITE_BASE_API_URL value in compiled image artifacts
        run: |
          image_ref="${FRONTEND_IMAGE}:${{ matrix.latest_tag }}"
          temp_dir="$(mktemp -d)"
          container_id=""
          cleanup() {
            if [ -n "${container_id}" ]; then
              docker rm -f "${container_id}" >/dev/null 2>&1 || true
            fi
            rm -rf "${temp_dir}"
          }
          trap cleanup EXIT

          docker pull "${image_ref}"
          container_id="$(docker create "${image_ref}")"
          docker cp "${container_id}:/dist" "${temp_dir}/dist"

          if ! grep -R -a -F -- "${VITE_BASE_API_URL}" "${temp_dir}/dist" >/dev/null; then
            echo "Expected VITE_BASE_API_URL value '${VITE_BASE_API_URL}' was not found in compiled artifacts inside ${image_ref}." >&2
            exit 1
          fi

          echo "Verified VITE_BASE_API_URL value is present in compiled artifacts inside ${image_ref}."
