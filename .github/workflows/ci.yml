name: CI

on:
  push:
    branches:
      - main
      - master

jobs:
  build-engine:
    name: Build ifecaro-development
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true
          cache-workspaces: ". -> target"

      - name: Cargo check
        run: cargo check --all-targets

      - name: Determine version
        id: version
        run: |
          version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="ifecaro") | .version')
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Capture build metadata
        id: build_meta
        run: |
          echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "${GITHUB_OUTPUT}"

      - name: Set image name
        run: |
          repo_owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "ENGINE_IMAGE=ghcr.io/${repo_owner}/ifecaro-development" >> "${GITHUB_ENV}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkit-image: public.ecr.aws/docker/library/buildkit:buildx-stable-1

      - name: Build and push ifecaro-development image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          cache-from: type=gha,scope=ifecaro-development-buildx
          cache-to: type=gha,mode=max,scope=ifecaro-development-buildx
          tags: |
            ${{ env.ENGINE_IMAGE }}:latest
            ${{ env.ENGINE_IMAGE }}:v${{ steps.version.outputs.version }}-beta${{ github.run_number }}

  build-frontend:
    name: Build ifecaro-engine (${{ matrix.deploy_env }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - deploy_env: staging
            app_env: staging
            api_url: https://ifecaro.com/staging/db/api
            latest_tag: latest-staging
            version_tag_suffix: staging
          - deploy_env: production
            app_env: production
            api_url: https://ifecaro.com/db/api
            latest_tag: latest
            version_tag_suffix: production
    env:
      CARGO_TERM_COLOR: always
      SKIP_TAILWIND: "1"
      VITE_APP_ENV: ${{ matrix.app_env }}
      VITE_BASE_API_URL: ${{ matrix.api_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true
          cache-workspaces: ". -> target"

      - name: Cargo check
        run: cargo check --all-targets

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --locked

      - name: Dioxus web build (release)
        run: dx build --release --platform web

      - name: Determine version
        id: version
        run: |
          version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="ifecaro") | .version')
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Capture build metadata
        id: build_meta
        run: |
          echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "${GITHUB_OUTPUT}"

      - name: Set image name
        run: |
          repo_owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "FRONTEND_IMAGE=ghcr.io/${repo_owner}/ifecaro-engine" >> "${GITHUB_ENV}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkit-image: public.ecr.aws/docker/library/buildkit:buildx-stable-1

      - name: Build and push ifecaro-engine image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          build-args: |
            VCS_REF=${{ github.sha }}
            BUILD_VERSION=${{ steps.version.outputs.version }}
            BUILD_TIME=${{ steps.build_meta.outputs.build_time }}
            VITE_APP_ENV=${{ matrix.app_env }}
            VITE_BASE_API_URL=${{ matrix.api_url }}
          cache-from: type=gha,scope=ifecaro-frontend-buildx-${{ matrix.deploy_env }}
          cache-to: type=gha,mode=max,scope=ifecaro-frontend-buildx-${{ matrix.deploy_env }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.environment=${{ matrix.app_env }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ matrix.latest_tag }}
            ${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.version }}-${{ matrix.version_tag_suffix }}
